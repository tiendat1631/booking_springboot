version: "3.8"

services:

  mysql:
    image: mysql:8
    container_name: booking_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: bus_booking
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./bus-booking-api
    container_name: booking_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bus_booking
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./bus-booking-client
    container_name: booking_frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8080
      API_BASE_URL: http://backend:8080/api
    depends_on:
      - backend

volumes:
  mysql_data: